<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Votely 事務局ポータル</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
  <style>
    body { background-color: #f8f9fa; min-height: 100vh; }
    .admin-card { max-width: 520px; margin: 2.5rem auto; border: none; box-shadow: 0 2px 12px rgba(0,0,0,.10); }
    .admin-card .card-header { background-color: #6f42c1; color: #fff; font-size: 1.05rem; font-weight: 600; padding: 1rem 1.25rem; }
    .badge-step { display: inline-flex; align-items: center; justify-content: center; width: 1.75rem; height: 1.75rem; border-radius: 50%; background-color: #6f42c1; color: #fff; font-size: .85rem; font-weight: 700; margin-right: .5rem; flex-shrink: 0; }
    .step-heading { display: flex; align-items: center; font-weight: 600; font-size: 1rem; margin-bottom: 1.25rem; color: #343a40; }
    .url-display { background-color: #f0ebff; border: 1px solid #c4a8ff; border-radius: .375rem; padding: .75rem 1rem; font-family: monospace; font-size: .85rem; word-break: break-all; color: #3d0099; }
    #step-password, #step-register, #step-result { display: none; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="card admin-card">
    <div class="card-header">Votely &mdash; 事務局ポータル（当日登録）</div>
    <div class="card-body p-4">

      <div id="step-password">
        <div class="step-heading"><span class="badge-step">1</span>パスワード認証</div>
        <p class="text-muted small mb-3">このページは事務局スタッフ専用です。<br>事務局用パスワードを入力してください。</p>
        <div class="mb-3">
          <label for="passwordInput" class="form-label fw-semibold">事務局パスワード</label>
          <input type="password" id="passwordInput" class="form-control" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter') onVerifyPassword()">
          <div id="password-error" class="text-danger small mt-1" style="display:none;"></div>
        </div>
        <div class="d-grid">
          <button id="verify-btn" type="button" class="btn btn-outline-secondary"
                  style="--bs-btn-color:#6f42c1;--bs-btn-border-color:#6f42c1;--bs-btn-hover-bg:#6f42c1;--bs-btn-hover-color:#fff;"
                  onclick="onVerifyPassword()">認証する</button>
        </div>
        <div id="password-spinner" class="text-center mt-3" style="display:none;">
          <div class="spinner-border spinner-border-sm text-secondary" role="status"><span class="visually-hidden">確認中...</span></div>
          <span class="text-muted small ms-2">確認中...</span>
        </div>
      </div>

      <div id="step-register">
        <div class="step-heading"><span class="badge-step">2</span>参加者のメールアドレスを登録</div>
        <p class="text-muted small mb-3">当日参加者のメールアドレスを入力してください。<br>登録後、専用の投票URLが発行されます。</p>
        <div class="mb-3">
          <label for="emailInput" class="form-label fw-semibold">メールアドレス</label>
          <input type="email" id="emailInput" class="form-control" placeholder="example@example.com" onkeydown="if(event.key==='Enter') onRegister()">
          <div id="register-error" class="text-danger small mt-1" style="display:none;"></div>
        </div>
        <div class="d-grid">
          <button id="register-btn" type="button" class="btn btn-primary" onclick="onRegister()">登録して投票URLを発行</button>
        </div>
        <div id="register-spinner" class="text-center mt-3" style="display:none;">
          <div class="spinner-border spinner-border-sm text-primary" role="status"><span class="visually-hidden">登録中...</span></div>
          <span class="text-muted small ms-2">登録・URL発行中...</span>
        </div>
        <div id="register-info" class="alert alert-info small mt-3" style="display:none;"></div>
      </div>

      <div id="step-result">
        <div class="step-heading"><span class="badge-step">3</span>投票URL発行完了</div>
        <div class="alert alert-success small mb-3"><strong id="result-message"></strong></div>
        <p class="text-muted small mb-1">発行された投票URL（参加者に伝えてください）:</p>
        <div class="url-display mb-3" id="issued-url"></div>
        <div class="d-flex gap-2 mb-4">
          <button type="button" class="btn btn-outline-secondary flex-grow-1" id="copy-btn" onclick="onCopyUrl()">URLをコピー</button>
          <a id="open-link" href="#" target="_blank" class="btn btn-outline-primary flex-grow-1">URLを開く</a>
        </div>
        <hr>
        <div class="d-grid mt-3">
          <button type="button" class="btn btn-secondary" onclick="onRegisterAnother()">別の参加者を登録する</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
var isAuthenticated = false;
var adminPassword = ''; // 認証済みパスワードを保持（registerAttendee のサーバー検証に使用）

function showStep(step) {
  ['password','register','result'].forEach(function(s) {
    var el = document.getElementById('step-' + s);
    if (el) el.style.display = (s === step) ? 'block' : 'none';
  });
}
window.addEventListener('load', function() {
  showStep('password');
  document.getElementById('passwordInput').focus();
});

function gasPost(payload) {
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload),
    redirect: 'follow'
  }).then(function(res) { return res.json(); });
}

function onVerifyPassword() {
  var pw = document.getElementById('passwordInput').value.trim();
  if (!pw) { showPasswordError('パスワードを入力してください。'); return; }
  setVerifyState(true);
  gasPost({ action: 'verifyPassword', password: pw })
    .then(function(result) {
      setVerifyState(false);
      if (result.success) {
        isAuthenticated = true;
        adminPassword = pw; // パスワードを保持
        document.getElementById('password-error').style.display = 'none';
        showStep('register');
        document.getElementById('emailInput').focus();
      } else {
        showPasswordError('パスワードが正しくありません。');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    })
    .catch(function(err) { setVerifyState(false); showPasswordError('通信エラー: ' + err.message); });
}
function showPasswordError(msg) { var el = document.getElementById('password-error'); el.textContent = msg; el.style.display = 'block'; }
function setVerifyState(loading) { document.getElementById('verify-btn').disabled = loading; document.getElementById('password-spinner').style.display = loading ? 'block' : 'none'; }

function onRegister() {
  if (!isAuthenticated) { showStep('password'); return; }
  var email = document.getElementById('emailInput').value.trim();
  if (!email || !email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) { showRegisterError('有効なメールアドレスを入力してください。'); return; }
  hideRegisterError();
  setRegisterState(true);
  gasPost({ action: 'registerAttendee', email: email, password: adminPassword })
    .then(function(result) {
      setRegisterState(false);
      if (result.success) showResultStep(result.url, result.message);
      else showRegisterError(result.message);
    })
    .catch(function(err) { setRegisterState(false); showRegisterError('通信エラー: ' + err.message); });
}
function showRegisterError(msg) { var el = document.getElementById('register-error'); el.textContent = msg; el.style.display = 'block'; }
function hideRegisterError() { document.getElementById('register-error').style.display = 'none'; document.getElementById('register-info').style.display = 'none'; }
function setRegisterState(loading) { document.getElementById('register-btn').disabled = loading; document.getElementById('register-spinner').style.display = loading ? 'block' : 'none'; }

function showResultStep(url, message) {
  // 投票URLをGitHub PagesのURLに変換して表示
  var pageUrl = window.location.origin + window.location.pathname.replace('admin.html','index.html');
  var token = url.split('token=')[1] || '';
  var displayUrl = token ? pageUrl + '?token=' + token : url;
  document.getElementById('result-message').textContent = message;
  document.getElementById('issued-url').textContent = displayUrl;
  document.getElementById('open-link').href = displayUrl;
  document.getElementById('copy-btn').textContent = 'URLをコピー';
  showStep('result');
}

function onCopyUrl() {
  var url = document.getElementById('issued-url').textContent;
  var btn = document.getElementById('copy-btn');
  (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject())
    .then(function() { flashCopyBtn(btn, true); })
    .catch(function() { fallbackCopy(url, btn); });
}
function flashCopyBtn(btn, ok) {
  btn.textContent = ok ? 'コピーしました！' : 'コピーに失敗しました';
  if (ok) btn.classList.replace('btn-outline-secondary','btn-success');
  setTimeout(function() { btn.textContent = 'URLをコピー'; if (ok) btn.classList.replace('btn-success','btn-outline-secondary'); }, 2500);
}
function fallbackCopy(text, btn) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  flashCopyBtn(btn, document.execCommand('copy'));
  document.body.removeChild(ta);
}

function onRegisterAnother() {
  document.getElementById('emailInput').value = '';
  hideRegisterError();
  showStep('register');
  document.getElementById('emailInput').focus();
}
</script>
</body>
</html>
